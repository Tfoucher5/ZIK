<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <radialGradient id="orb1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Decorative music notes -->
  <text x="80" y="180" font-size="90" opacity="0.08" font-family="serif">♪</text>
  <text x="1060" y="500" font-size="110" opacity="0.07" font-family="serif">♫</text>
  <text x="950" y="150" font-size="70" opacity="0.06" font-family="serif">♩</text>
  <text x="120" y="520" font-size="80" opacity="0.07" font-family="serif">♬</text>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Logo / Brand -->
  <text x="600" y="230" font-family="'Bricolage Grotesque', 'Arial Black', sans-serif" font-size="140" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-4">ZIK<tspan fill="url(#accent)">.</tspan></text>

  <!-- Tagline -->
  <text x="600" y="310" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="400" fill="#a78bfa" text-anchor="middle" letter-spacing="1">BLIND TEST MULTIJOUEUR EN LIGNE</text>

  <!-- Divider -->
  <rect x="500" y="340" width="200" height="2" fill="url(#accent)" rx="1"/>

  <!-- Features pills -->
  <rect x="190" y="380" width="220" height="46" rx="23" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
  <text x="300" y="410" font-family="Inter, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🎮 Multijoueur live</text>

  <rect x="490" y="380" width="220" height="46" rx="23" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
  <text x="600" y="410" font-family="Inter, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🎵 Playlists custom</text>

  <rect x="790" y="380" width="220" height="46" rx="23" fill="rgba(124,58,237,0.25)" stroke="rgba(124,58,237,0.5)" stroke-width="1"/>
  <text x="900" y="410" font-family="Inter, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">🏆 Classement ELO</text>

  <!-- URL -->
  <text x="600" y="540" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.4)" text-anchor="middle">zik.app</text>
</svg>
